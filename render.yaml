services:
  - type: web
    name: anon-chat
    env: node
    plan: free
    buildCommand: npm install && cd server && npm install && cd .. && npm run build:web
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
